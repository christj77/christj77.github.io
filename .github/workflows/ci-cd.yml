name: CI/CD for christj77.github.io

on:
  push:
    branches:
      - main # Trigger workflow on pushes to the 'main' branch
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Check out code
      uses: actions/checkout@v3

        # Step: Validate HTML files
        - name: Validate HTML files
        run: htmlhint index.html

    # Step 3: Validate CSS files
    - name: Validate CSS files
      run: |
        npx stylelint "**/*.css"

    # Step 4: Validate JavaScript files
    - name: Validate JavaScript files
      run: |
        npx eslint "**/*.js"

    # Step 5: Additional optional tests (e.g., link checking)
    - name: Check for broken links
      run: |
        npx broken-link-checker http://localhost:8000 -ro